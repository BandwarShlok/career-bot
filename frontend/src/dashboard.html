<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Dashboard | Career Compass</title>
  <link rel="icon" href="image/Logo.jpg" />

  <style>
    body {
      margin: 0;
      font-family: Poppins, Arial, sans-serif;
      background: #f4f6ff;
    }

    header {
      background: #0e21fc;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    header img { height: 40px; }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    nav button {
      margin-left: 20px;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 40px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    .stat-card h3 {
      margin: 0;
      color: #0e21fc;
    }

    .stat-card span {
      font-size: 30px;
      font-weight: bold;
    }

    .section {
      background: white;
      margin-top: 40px;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #1437ff;
      color: white;
      padding: 12px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <img src="image/Logo.jpg" />
  <nav>
    <a href="home.html">Home</a>
    <a href="test.html">Test</a>
    <a href="about.html">About</a>
    <button onclick="logout()">Logout</button>
  </nav>
</header>

<div class="container">

  <h1>Welcome 👋</h1>
  <p id="loadingText">Loading your dashboard...</p>

  <div class="stats">
    <div class="stat-card">
      <h3>Tests Taken</h3>
      <span id="testsCount">0</span>
    </div>

    <div class="stat-card">
      <h3>Best Score</h3>
      <span id="bestScore">0%</span>
    </div>

    <div class="stat-card">
      <h3>Plans Booked</h3>
      <span id="plansCount">0</span>
    </div>
  </div>

  <div class="section">
    <h2>My Test Results</h2>
    <table>
      <thead>
        <tr>
          <th>Test Name</th>
          <th>Score (%)</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="testResults"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>My Counselling Plans</h2>
    <table>
      <thead>
        <tr>
          <th>Plan</th>
          <th>Price</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="plans"></tbody>
    </table>
  </div>

</div>

<script>
/* ===== AUTH ===== */
const userId = localStorage.getItem("userId");

if (!userId) {
  alert("Please login first");
  window.location.href = "loginPage.html";
}

function logout() {
  localStorage.removeItem("userId");
  window.location.href = "loginPage.html";
}

/* ===== HELPERS ===== */
function handleError(err) {
  console.error(err);
  alert("Unable to load dashboard data");
}

function animateNumber(id, value, percent=false) {
  let i = 0;
  const el = document.getElementById(id);
  const timer = setInterval(() => {
    el.innerText = percent ? i + "%" : i;
    if (i >= value) clearInterval(timer);
    i++;
  }, 15);
}

/* ===== TESTS ===== */
fetch(`http://localhost:5000/my-tests/${userId}`)
  .then(res => res.json())
  .then(data => {
    if (!Array.isArray(data)) return;

    const table = document.getElementById("testResults");
    table.innerHTML = "";

    let best = 0;

    data.forEach(t => {
      best = Math.max(best, t.score || 0);
      table.innerHTML += `
        <tr>
          <td>${t.testName}</td>
          <td>${t.score}%</td>
          <td>${new Date(t.date).toLocaleDateString()}</td>
        </tr>`;
    });

    animateNumber("testsCount", data.length);
    animateNumber("bestScore", best, true);
    document.getElementById("loadingText").style.display = "none";
  })
  .catch(handleError);

/* ===== PLANS ===== */
fetch(`http://localhost:5000/my-plans/${userId}`)
  .then(res => res.json())
  .then(data => {
    if (!Array.isArray(data)) return;

    const table = document.getElementById("plans");
    table.innerHTML = "";
    animateNumber("plansCount", data.length);

    data.forEach(p => {
      table.innerHTML += `
        <tr>
          <td>${p.plan}</td>
          <td>₹${p.price}</td>
          <td>${p.paymentStatus || "PAID"}</td>
          <td>${new Date(p.createdAt).toLocaleDateString()}</td>
        </tr>`;
    });
  })
  .catch(handleError);
</script>

</body>
</html>
