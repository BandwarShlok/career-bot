<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>My Dashboard | Career Compass</title>
  <link rel="icon" type="image/x-icon" href="image/Logo.jpg" />

  <style>
    body {
      margin: 0;
      font-family: "Poppins", Arial, sans-serif;
      background: #f4f6ff;
      color: #222;
    }

    /* ===== HEADER ===== */
    header {
      background: #0e21fc;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }


    header img {
      height: 40px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }

    nav button {
      margin-left: 20px;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    /* ===== MAIN ===== */
    .container {
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .welcome {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .welcome h1 {
      margin: 0;
      font-size: 32px;
    }

    .welcome p {
      margin-top: 8px;
      color: #555;
    }

    /* ===== STATS ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .stat-card {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.12);
    }

    .stat-card h3 {
      margin: 0;
      color: #0e21fc;
      font-size: 16px;
    }

    .stat-card span {
      display: block;
      margin-top: 10px;
      font-size: 28px;
      font-weight: bold;
    }

    /* ===== SECTIONS ===== */
    .section {
      margin-top: 50px;
    }

    .section h2 {
      margin-bottom: 15px;
      color: #0e21fc;
    }

    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      border-collapse: collapse;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    th,
    td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #0e21fc;
      color: white;
    }

    tr:hover {
      background: #f1f3ff;
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header>
    <img src="image/Logo.jpg" alt="Logo" />
    <nav>
      <a href="home.html">Home</a>
      <a href="test.html">Test</a>
      <a href="about.html">About</a>
      <button onclick="logout()">Logout</button>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <div class="container">

    <!-- WELCOME -->
    <div class="welcome">
      <div>
        <h1>Welcome 👋</h1>
        <p>Here’s your career progress at a glance</p>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <h3>Tests Taken</h3>
        <span id="testsCount">0</span>
      </div>

      <div class="stat-card">
        <h3>Best Score</h3>
        <span id="bestScore">0%</span>
      </div>

      <div class="stat-card">
        <h3>Plans Booked</h3>
        <span id="plansCount">0</span>
      </div>
    </div>

    <!-- TEST RESULTS -->
    <div class="section">
      <h2>My Test Results</h2>
      <table>
        <thead>
          <tr>
            <th>Test Name</th>
            <th>Score (%)</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="testResults"></tbody>
      </table>
    </div>

    <!-- PLANS -->
    <div class="section">
      <h2>My Counselling Plans</h2>
      <table>
        <thead>
          <tr>
            <th>Plan</th>
            <th>Price</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="plans"></tbody>
      </table>
    </div>

  </div>

  <script>
    const userId = localStorage.getItem("userId");

    if (!userId) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.removeItem("userId");
      window.location.href = "login.html";
    }

    /* ===== LOAD TESTS ===== */
    fetch(`http://localhost:5000/my-tests/${userId}`)
      .then(res => res.json())
      .then(data => {
        const table = document.getElementById("testResults");
        document.getElementById("testsCount").innerText = data.length;

        let best = 0;
        data.forEach(t => {
          if (t.score > best) best = t.score;

          table.innerHTML += `
          <tr>
            <td>${t.testName}</td>
            <td>${t.score}</td>
            <td>${new Date(t.date).toLocaleDateString()}</td>
          </tr>
        `;
        });

        document.getElementById("bestScore").innerText = best + "%";
      });

    /* ===== LOAD PLANS ===== */
    fetch(`http://localhost:5000/my-plans/${userId}`)
      .then(res => res.json())
      .then(data => {
        const table = document.getElementById("plans");
        document.getElementById("plansCount").innerText = data.length;

        data.forEach(p => {
          table.innerHTML += `
          <tr>
            <td>${p.plan}</td>
            <td>₹${p.price}</td>
            <td>${p.paymentStatus || "PAID"}</td>
            <td>${new Date(p.createdAt).toLocaleDateString()}</td>
          </tr>
        `;
        });
      });
  </script>

</body>

</html>
