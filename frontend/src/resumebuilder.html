<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resume Builder</title>
<link rel="icon" type="image/x-icon" href="image/Logo.jpg">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f3;
        margin: 0;
        padding: 20px;
        display: flex;
        gap: 20px;
    }

    .container {
        width: 45%;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        margin-top: 0;
        color: white;
    }
    h1{
        margin-top: 0;
        color: #396ff7
    }

    input, textarea, select {
        width: 100%;
        padding: 8px;
        margin: 5px 0 15px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        padding: 10px 15px;
        border: none;
        background: #0077b6;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }

    .remove-btn {
        background: #d62828;
        margin-top: 5px;
    }

    .preview-container {
        width: 50%;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .resume-header {
        background: #1b263b;
        color: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    .section {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
    }

    .item {
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 1px solid #ddd;
    }

    .stars {
        color: #f4b400;
        font-size: 18px;
        margin-top: 5px;
    }
</style>
</head>
<body>

<!-- FORM -->
<div class="container">
    <h1>Resume Builder</h1>

    <label>Name</label>
    <input type="text" id="name">

    <label>Email</label>
    <input type="text" id="email">

    <label>Phone</label>
    <input type="text" id="phone">

    <!-- EDUCATION -->
    <h3>Education</h3>
    <div id="education-list"></div>
    <button onclick="addEducation()">+ Add Education</button>

    <!-- EXPERIENCE -->
    <h3>Experience</h3>
    <div id="experience-list"></div>
    <button onclick="addExperience()">+ Add Experience</button>

    <!-- SKILLS -->
    <h3>Skills</h3>
    <div id="skill-list"></div>
    <button onclick="addSkill()">+ Add Skill</button>

    <br><br>
    <button onclick="generateResume()">Preview Resume</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>


<!-- PREVIEW -->
<div class="preview-container" id="resume-preview">
    <div class="resume-header">
        <h2>Your Name</h2>
        <p>Email | Phone</p>
    </div>

    <div class="section">
        <h3>Education</h3>
        <div id="education-preview"></div>
    </div>

    <div class="section">
        <h3>Experience</h3>
        <div id="experience-preview"></div>
    </div>

    <div class="section">
        <h3>Skills</h3>
        <div id="skill-preview"></div>
    </div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script>

// ---------------- ADD EDUCATION ----------------
function addEducation() {
    const div = document.createElement("div");
    div.className = "item edu-item";
    div.innerHTML = `
        <label>Degree / Course</label>
        <input class="edu-degree" placeholder="B.Tech CSE">

        <label>School / College</label>
        <input class="edu-school" placeholder="XYZ University">

        <label>Percentage / CGPA</label>
        <input class="edu-percentage" placeholder="85%">

        <label>Year</label>
        <input type="text" class="edu-year" placeholder="2020">

        <button class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
    `;
    document.getElementById("education-list").appendChild(div);
}

// ---------------- ADD EXPERIENCE ----------------
function addExperience() {
    const div = document.createElement("div");
    div.className = "item exp-item";
    div.innerHTML = `
        <label>Job Title</label>
        <input class="exp-title" placeholder="Software Developer">

        <label>Company</label>
        <input class="exp-company" placeholder="Google">

        <label>From</label>
        <input type="date" class="exp-from">

        <label>To</label>
        <input type="date" class="exp-to">

        <button class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
    `;
    document.getElementById("experience-list").appendChild(div);
}

// ---------------- ADD SKILLS ----------------
function addSkill() {
    const div = document.createElement("div");
    div.className = "item skill-item";

    div.innerHTML = `
        <label>Skill</label>
        <input class="skill-name" placeholder="JavaScript">

        <label>Rating</label>
        <select class="skill-rating">
            <option value="1">★☆☆☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="3">★★★☆☆</option>
            <option value="4">★★★★☆</option>
            <option value="5">★★★★★</option>
        </select>

        <button class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
    `;

    document.getElementById("skill-list").appendChild(div);
}


// ---------------- GENERATE PREVIEW ----------------
function generateResume() {

    // HEADER
    document.querySelector(".resume-header h2").innerText = document.getElementById("name").value;
    document.querySelector(".resume-header p").innerText =
        document.getElementById("email").value + " | " + document.getElementById("phone").value;

    // EDUCATION
    let eduHTML = "";
    document.querySelectorAll(".edu-item").forEach(item => {
        eduHTML += `
            <div class="item">
                <p><b>${item.querySelector(".edu-degree").value}</b> — 
                ${item.querySelector(".edu-school").value} (${item.querySelector(".edu-year").value})</p>
                <p><b>Percentage:</b> ${item.querySelector(".edu-percentage").value}</p>
            </div>`;
    });
    document.getElementById("education-preview").innerHTML = eduHTML;

    // EXPERIENCE
    let expHTML = "";
    document.querySelectorAll(".exp-item").forEach(item => {
        expHTML += `
            <div class="item">
                <p><b>${item.querySelector(".exp-title").value}</b> — 
                ${item.querySelector(".exp-company").value}</p>
                <p>${item.querySelector(".exp-from").value} to ${item.querySelector(".exp-to").value}</p>
            </div>`;
    });
    document.getElementById("experience-preview").innerHTML = expHTML;

    // SKILLS
    let skillHTML = "";
    document.querySelectorAll(".skill-item").forEach(item => {
        const name = item.querySelector(".skill-name").value;
        const rating = item.querySelector(".skill-rating").value;

        let stars = "★".repeat(rating) + "☆".repeat(5 - rating);

        skillHTML += `
            <div class="item">
                <p><b>${name}</b></p>
                <p class="stars">${stars}</p>
            </div>`;
    });

    document.getElementById("skill-preview").innerHTML = skillHTML;
}


// ---------------- DOWNLOAD PDF ----------------
function downloadPDF() {
    const element = document.getElementById("resume-preview");
    html2pdf().from(element).save("resume.pdf");
}

</script>

</body>
</html>
